version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: brawlreport-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      # No auth for local dev; set MONGO_INITDB_ROOT_USERNAME/PASSWORD for secured envs
      MONGO_INITDB_DATABASE: brawlreport
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    container_name: brawlreport-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface (used by clickhouse-go)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: brawlreport
      CLICKHOUSE_USER: brawlreport
      CLICKHOUSE_PASSWORD: brawlreport_local
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  clickhouse_data:
    driver: local
